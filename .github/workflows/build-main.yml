name: Build Container Image

on:
  workflow_dispatch:
    inputs:
      desktop:
        description: "Desktop Environment"
        required: true
        default: "cosmic"
        type: choice
        options:
          - cosmic
          - gnome
          - niri
      edition:
        description: "Edition"
        required: true
        default: "main"
        type: choice
        options:
          - main
  workflow_call:
    inputs:
      desktop:
        description: "Desktop Environment"
        required: true
        type: string
      edition:
        description: "Edition"
        required: true
        type: string

env:
  IMAGE_DESC: "Custom Fedora Atomic image with COSMIC™ desktop"
  IMAGE_KEYWORDS: "bootc,ublue,universal-blue"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/120078124?s=200&v=4"
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_push:
    name: Build and push image
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> "${GITHUB_ENV}"
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "${GITHUB_ENV}"

      - name: Set Dynamic Variables
        id: dynamic_vars
        run: |
          DESKTOP="${{ inputs.desktop }}"
          EDITION="${{ inputs.edition }}"

          if [[ "$EDITION" == "main" ]]; then
              FULL_NAME="${IMAGE_NAME}-${DESKTOP}"
          else
              FULL_NAME="${IMAGE_NAME}-${DESKTOP}-${EDITION}"
          fi

          echo "DESKTOP=$DESKTOP" >> $GITHUB_OUTPUT
          echo "EDITION=$EDITION" >> $GITHUB_OUTPUT
          echo "FULL_NAME=$FULL_NAME" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@v7
        with:
          extra-squeeze: true

      - name: Mount BTRFS for podman storage
        uses: ublue-os/container-storage-action@main

      - name: Get current date
        id: date
        run: |
          echo "date_iso=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "date_tag=$(date -u +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Image Metadata
        uses: docker/metadata-action@v6
        id: metadata
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ steps.dynamic_vars.outputs.FULL_NAME }}
          tags: |
            type=raw,value=${{ env.DEFAULT_TAG }}
            type=raw,value=${{ steps.date.outputs.date_tag }}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
          labels: |
            containers.bootc=1
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/refs/heads/main/README.md
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.created=${{ steps.date.outputs.date_iso }}
            org.opencontainers.image.title=${{ steps.dynamic_vars.outputs.FULL_NAME }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Build Image
        id: build
        run: |
          FULL_IMAGE_NAME="${{ steps.dynamic_vars.outputs.FULL_NAME }}"

          podman build \
            --format=docker \
            --file ./Containerfile \
            --tag "${FULL_IMAGE_NAME}:latest" \
            --build-arg DESKTOP="${{ steps.dynamic_vars.outputs.DESKTOP }}" \
            --build-arg EDITION="${{ steps.dynamic_vars.outputs.EDITION }}" \
            .

      - name: Rechunk Image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: rechunk
        run: |
          FULL_IMAGE_NAME="${{ steps.dynamic_vars.outputs.FULL_NAME }}"
        
          export CHUNKAH_CONFIG_STR="$(podman inspect "${FULL_IMAGE_NAME}")"
          podman run --rm \
            "--mount=type=image,src=${FULL_IMAGE_NAME},target=/chunkah" \
            -e CHUNKAH_CONFIG_STR \
            quay.io/coreos/chunkah build --label ostree.bootable=1 --compressed --max-layers 128 | \
            podman load | \
            sort -n | \
            head -n1 | \
            cut -d, -f2 | \
            cut -d: -f3 | \
            xargs -I{} podman tag {} "${FULL_IMAGE_NAME}"

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login --username ${{ github.actor }} --password-stdin ghcr.io

      - name: Install Podman from Brew
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          /home/linuxbrew/.linuxbrew/bin/brew install podman

      - name: Push Image To GHCR
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: push
        env:
          RAW_TAGS: ${{ steps.metadata.outputs.tags }}
          FULL_NAME: ${{ steps.dynamic_vars.outputs.FULL_NAME }}
        run: |
          IMAGE_REF="localhost/${FULL_NAME}:latest"

          DIGEST=$(podman inspect --format '{{.Digest}}' "$IMAGE_REF")
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

          TAGS_FOR_SIGNING=""
          
          for tag in $RAW_TAGS; do
            echo "Pushing tag: $tag"
            podman push "$IMAGE_REF" "$tag"
            TAGS_FOR_SIGNING="${TAGS_FOR_SIGNING}${TAGS_FOR_SIGNING:+ }$tag"
          done

          echo "tags_for_signing=$TAGS_FOR_SIGNING" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)

      - name: Sign main container image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          DIGEST: ${{ steps.push.outputs.digest }}
          FULL_NAME: ${{ steps.dynamic_vars.outputs.FULL_NAME }}
          OWNER: ${{ github.repository_owner }}
        run: |
          RAW_URL="ghcr.io/${OWNER}/${FULL_NAME}@${DIGEST}"
          LOWER_URL=$(echo "$RAW_URL" | tr '[:upper:]' '[:lower:]')
          
          echo "${{ secrets.GITHUB_TOKEN }}" | cosign login ghcr.io -u ${{ github.actor }} --password-stdin
          echo "Signing image: ghcr.io/${{ github.repository_owner }}/${FULL_NAME}@${DIGEST}"
          cosign sign -y --key env://COSIGN_PRIVATE_KEY "$LOWER_URL"
