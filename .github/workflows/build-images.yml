---
name: Build all container images
on:
  schedule:
    - cron: "05 10 * * *" # 10:05am UTC everyday
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "README.md"
      - ".github/workflows/**"
      - "system_files/**"
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "README.md"
      - ".github/workflows/**"
      - "system_files/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-image:
    uses: ./.github/workflows/build-main.yml
    secrets: inherit
    with:
      desktop: default
      edition: desktop
