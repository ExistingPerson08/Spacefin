rows:
  - banner:
      image:
        light-uri: https://existingperson08.github.io/_images/spacefin/bazaar-curated/dev.jpg
        dark-uri: https://existingperson08.github.io/_images/spacefin/bazaar-curated/dev.jpg
        fit: cover
        can-shrink: true
      dark-color: "#2b1f3d"
      light-color: "#778cf7"
  - section:
      title: "Welcome to Bazaar"
      subtitle:
        string: |
          Discover cool apps for your Spacefin system.
      overflow-count: 8
      appids:
        list:
          - page.codeberg.libre_menu_editor.LibreMenuEditor
          - re.sonny.Eloquent
          - org.gnome.Maps
          - app.drey.Damask
          - com.github.ADBeveridge.Raider
          - org.gnome.gitlab.YaLTeR.VideoTrimmer
          - com.github.maoschanz.drawing
          - com.spotify.Client
          - app.ytmdesktop.ytmdesktop
          - tv.plex.PlexDesktop
          - app.drey.Warp
          - org.localsend.localsend_app
          - com.github.zocker_160.SyncThingy
          - io.github.nozwock.Packet
          - org.gnome.gitlab.somas.Apostrophe
          - org.gnome.World.PikaBackup
          - md.obsidian.Obsidian
          - org.gnome.Logs
  - featured-carousel:
      disable-auto-rotate: false
      appids:
        list:
          - com.github.flxzt.rnote
          - be.alexandervanhee.gradia
          - io.github.alainm23.planify
  - section:
      title: "Web Browsers"
      list-type: rich
      appids:
        list:
          - org.mozilla.firefox
          - com.google.Chrome
          - com.brave.Browser
          - org.chromium.Chromium
          - com.opera.Opera
          - com.vivaldi.Vivaldi
          - app.zen_browser.zen
  - section:
      title: "Creative & Media"
      appids:
        list: # Sections of 12 apps look nice at all window widths
          - org.gnome.Music
          - org.gnome.Showtime
          - org.gnome.Loupe
          - org.gimp.GIMP
          - org.inkscape.Inkscape
          - org.blender.Blender
          - org.kde.krita
          - org.audacityteam.Audacity
          - org.kde.kdenlive
          - com.obsproject.Studio
          - org.shotcut.Shotcut
          - com.github.PintaProject.Pinta
  - section:
      title: "Developer Tools"
      subtitle:
        string: |
          Install these to become the *ultimate* developer
      list-type: rich
      appids:
        list:
          - me.iepure.devtoolbox
          - org.gnome.Builder
          - io.podman_desktop.PodmanDesktop
          - sh.loft.devpod
          - com.mardojai.ForgeSparks
      enable-bulk-install: true
  - banner:
      image:
        uri: https://existingperson08.github.io/_images/spacefin/bazaar-curated/games.jpg
        fit: cover
        can-shrink: true
  - section:
      title: "Gaming"
      subtitle:
        string: |
          Don't forget to touch some grass as well!
      list-type: rich
      appids:
        list:
          - com.heroicgameslauncher.hgl
          - com.discordapp.Discord
          - net.lutris.Lutris
          - com.vysp3r.ProtonPlus
          - com.dec05eba.gpu_screen_recorder
          - com.valvesoftware.SteamLink
          - org.prismlauncher.PrismLauncher
          - org.wesnoth.Wesnoth
          - com.adamcake.Bolt
      enable-bulk-install: true
  - banner:
      image:
        uri: https://existingperson08.github.io/_images/spacefin/bazaar-curated/recommended.jpg
        fit: cover
        can-shrink: true
